<!DOCTYPE html>
<html>
<head>
  <title>Currency Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <h1>💱 Currency Converter</h1>

    <!-- Dark Mode -->
    <button id="theme-btn">🌙 Toggle Theme</button>

    <!-- Converter -->
    <div class="card">
      <input type="number" id="amount" placeholder="Enter amount">

      <div class="row">
        <select id="from"></select>
        <span>→</span>
        <select id="to"></select>
      </div>

      <button onclick="convert()">Convert</button>

      <p id="loading"></p>
      <h2 id="result"></h2>
    </div>

    <!-- Base Currency -->
    <p id="base-label">Base Currency: INR</p>

    <!-- Search + Sort -->
    <div class="controls">
      <input type="text" id="search" placeholder="Search currency...">
      <select id="sort">
        <option value="">Sort</option>
        <option value="asc">Rate ↑</option>
        <option value="desc">Rate ↓</option>
      </select>
    </div>

    <!-- Currency Cards -->
    <div id="container"></div>

  </div>

<script src="script.js"></script>
</body>
</html>
